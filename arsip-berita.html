<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Arsip Berita | MAS MANBA'USSALAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    </head>
<body class="bg-bgLight font-sans">
    <main class="max-w-7xl mx-auto px-4 py-20">
        <h2 class="text-3xl font-bold text-primary mb-12">Semua Berita & Pengumuman</h2>
        
        <div id="arsip-container" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            </div>
    </main>

    <script>
        fetch('data/berita.json')
        .then(r => r.json())
        .then(data => {
            const container = document.getElementById('arsip-container');
            // Menampilkan SEMUA data tanpa slice(0,3)
            container.innerHTML = data.map(b => `
                <a href="detail-berita.html?slug=${b.slug}" class="bg-white rounded-2xl overflow-hidden border shadow-sm hover:shadow-lg transition-all">
                    <img src="${b.gambar}" class="w-full h-48 object-cover">
                    <div class="p-6">
                        <span class="text-xs font-bold text-primary uppercase">${b.kategori}</span>
                        <h3 class="font-bold text-lg mt-2">${b.judul}</h3>
                        <p class="text-sm text-slate-500 mt-2">${b.tanggal}</p>
                    </div>
                </a>
            `).join('');
        });
    </script>
</body>
</html>
