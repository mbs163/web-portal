<!-- Tambahkan script share di bagian bawah -->
<script>
    function shareSocial(type) {
        const url = window.location.href;
        const text = "Lihat berita menarik di MAS Manba'ussalam";
        if(type === 'wa') window.open(`https://wa.me/?text=${text}: ${url}`, '_blank');
        if(type === 'fb') window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank');
        if(type === 'x') window.open(`https://twitter.com/intent/tweet?url=${url}&text=${text}`, '_blank');
    }
</script>
