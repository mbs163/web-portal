<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database PMB | Admin MAS MANBA'USSALAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#0B1F3B', accent: '#D4AF37', bgLight: '#F8FAFC' } } } }
    </script>
</head>
<body class="bg-bgLight font-sans antialiased flex h-screen overflow-hidden">

    <div id="mobile-overlay" class="fixed inset-0 bg-slate-900/60 z-30 hidden md:hidden transition-opacity" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-primary text-white flex flex-col h-full overflow-y-auto shadow-2xl transform -translate-x-full md:translate-x-0 md:relative transition-transform duration-300 ease-in-out">
        <div class="p-6 flex items-center justify-between border-b border-white/10 sticky top-0 bg-primary z-10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-accent rounded-xl flex items-center justify-center text-primary text-xl font-bold"><i class="fa-solid fa-shield-halved"></i></div>
                <div><h2 class="font-bold tracking-wide">Admin Portal</h2></div>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-white/50"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>

        <div class="flex-1 py-6 px-4 space-y-8">
            <ul class="space-y-1">
                <li><a href="index.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-slate-300 hover:text-white hover:bg-white/10 transition-all"><i class="fa-solid fa-house w-5"></i> Dashboard</a></li>
                <li><a href="admin-pmb.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-accent bg-white/10 font-bold"><i class="fa-solid fa-user-graduate w-5"></i> Data PMB</a></li>
                <li><a href="berita.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-slate-300 hover:text-white hover:bg-white/10 transition-all"><i class="fa-solid fa-newspaper w-5"></i> Berita Web</a></li>
            </ul>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto bg-slate-50">
        <header class="bg-white shadow-sm border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
            <button onclick="toggleSidebar()" class="md:hidden text-slate-500"><i class="fa-solid fa-bars"></i></button>
            <h1 class="font-bold text-primary">Data Pendaftar PMB</h1>
        </header>

        <div class="p-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-400 text-xs uppercase font-bold border-b">
                            <th class="p-3">Nama</th>
                            <th class="p-3">Sekolah Asal</th>
                            <th class="p-3">Status</th>
                        </tr>
                    </thead>
                    <tbody id="pmb-tbody" class="text-sm">
                        <tr><td colspan="3" class="p-4 text-center">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // 1. URL Apps Script Anda (WAJIB berakhir dengan /exec)
        const URL_GAS = "https://script.google.com/macros/s/AKfycbw_6Q-M6_pvGLUZH4IFtefxa3iwStdhyD7nii4lFIMAyYaILCfnbLOp6DnuWChG2HRmpw/exec";

        // 2. Fetch Data
        async function loadData() {
            try {
                const response = await fetch(URL_GAS);
                const data = await response.json();
                const tbody = document.getElementById('pmb-tbody');
                
                tbody.innerHTML = data.map(item => `
                    <tr class="border-b">
                        <td class="p-3 font-semibold">${item.nama || '-'}</td>
                        <td class="p-3">${item.asalSekolah || '-'}</td>
                        <td class="p-3"><span class="bg-green-50 text-green-700 px-2 py-1 rounded text-xs font-bold">Terverifikasi</span></td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
                document.getElementById('pmb-tbody').innerHTML = `<tr><td colspan="3" class="p-4 text-center text-red-500">Gagal memuat data. Periksa Deployment Google Apps Script Anda.</td></tr>`;
            }
        }

        // Toggle Sidebar Mobile
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('mobile-overlay').classList.toggle('hidden');
        }

        loadData();
    </script>
</body>
</html>
