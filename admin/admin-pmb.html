<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem PMB | Admin MAS MANBA'USSALAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0B1F3B', accent: '#D4AF37', bgLight: '#F8FAFC', textDark: '#0F172A' },
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] }
                }
            }
        }
        if (localStorage.getItem('userRole') !== 'admin') {
            window.location.href = 'https://mbs163.github.io/portal-app/login.html';
        }
    </script>
</head>
<body class="bg-bgLight text-textDark font-sans antialiased flex h-screen overflow-hidden">

    <div id="mobile-overlay" class="fixed inset-0 bg-slate-900/60 z-30 hidden md:hidden transition-opacity" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-primary text-white flex flex-col h-full overflow-y-auto shadow-2xl transform -translate-x-full md:translate-x-0 md:relative transition-transform duration-300 ease-in-out">
        <div class="p-6 flex items-center justify-between border-b border-white/10 sticky top-0 bg-primary z-10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-accent rounded-xl flex items-center justify-center text-primary text-xl font-bold"><i class="fa-solid fa-shield-halved"></i></div>
                <div>
                    <h2 class="font-bold tracking-wide leading-tight">Admin Portal</h2>
                    <p class="text-[10px] text-accent uppercase tracking-widest">MAS Manba'ussalam</p>
                </div>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-white/50 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>

        <div class="flex-1 py-6 px-4 space-y-8">
            <div>
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 px-2">Kelola Konten</h3>
                <ul class="space-y-1">
                    <li><a href="index.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-slate-300 hover:text-white hover:bg-white/10"><i class="fa-solid fa-house w-5"></i> Dashboard Utama</a></li>
                    <li><a href="berita.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-slate-300 hover:text-white hover:bg-white/10"><i class="fa-solid fa-newspaper w-5"></i> Berita</a></li>
                    <li><a href="admin-galeri.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-slate-300 hover:text-white hover:bg-white/10"><i class="fa-solid fa-images w-5"></i> Galeri Foto</a></li>
                </ul>
            </div>
            <div>
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 px-2">Sistem Aplikasi</h3>
                <ul>
                    <li><a href="admin-pmb.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-accent bg-white/10 font-bold"><i class="fa-solid fa-user-graduate w-5"></i> Data PMB</a></li>
                </ul>
            </div>
        </div>
        <div class="p-4 border-t border-white/10"><button onclick="logout()" class="w-full text-red-400 text-sm font-bold"><i class="fa-solid fa-power-off"></i> Keluar Sistem</button></div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto bg-slate-50">
        <header class="bg-white shadow-sm border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
            <h1 class="text-xl font-bold text-primary">Sistem Penerimaan</h1>
            <span class="text-sm font-medium text-slate-500" id="admin-name">Admin</span>
        </header>

        <div class="p-6 sm:p-10 max-w-7xl mx-auto w-full">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                    <h2 class="text-3xl font-extrabold text-primary">Database Calon Siswa</h2>
                </div>
                <div class="flex bg-white rounded-lg p-1 shadow-sm border border-slate-200">
                    <button onclick="filterData('Semua')" class="px-4 py-2 text-xs font-bold rounded-md bg-slate-100 hover:bg-slate-200">Semua</button>
                    <button onclick="filterData('Menunggu')" class="px-4 py-2 text-xs font-bold rounded-md hover:bg-slate-100">Menunggu</button>
                    <button onclick="filterData('Diterima')" class="px-4 py-2 text-xs font-bold rounded-md hover:bg-slate-100">Diterima</button>
                    <button onclick="filterData('Ditolak')" class="px-4 py-2 text-xs font-bold rounded-md hover:bg-slate-100">Ditolak</button>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-slate-500 text-xs font-bold uppercase">
                        <tr><th class="p-4">Tanggal</th><th class="p-4">NISN</th><th class="p-4">Nama</th><th class="p-4">Status</th><th class="p-4 text-center">Aksi</th></tr>
                    </thead>
                    <tbody id="tabelPendaftar" class="text-sm divide-y">
                        <tr><td colspan="5" class="p-12 text-center text-slate-400"><i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-emerald-500"></i><p>Memuat data...</p></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const URL_GAS = "https://script.google.com/macros/s/AKfycbw_6Q-M6_pvGLUZH4IFtefxa3iwStdhyD7nii4lFIMAyYaILCfnbLOp6DnuWChG2HRmpw/exec";
        let pmbData = [];

        async function loadData() {
            const res = await fetch(URL_GAS + "?action=getPMB");
            const json = await res.json();
            pmbData = json.data;
            renderTable(pmbData);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tabelPendaftar');
            tbody.innerHTML = data.map((item, index) => `
                <tr class="hover:bg-slate-50">
                    <td class="p-4">${item.waktu}</td>
                    <td class="p-4">${item.nisn}</td>
                    <td class="p-4 font-bold">${item.nama}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded text-xs font-bold ${getStatusStyle(item.status)}">${item.status || 'Menunggu'}</span></td>
                    <td class="p-4 text-center"><button onclick="openDetail(${index})" class="text-primary font-bold hover:underline">DETAIL</button></td>
                </tr>
            `).join('');
        }

        function getStatusStyle(s) {
            if(s === 'Diterima') return 'bg-green-100 text-green-700';
            if(s === 'Ditolak') return 'bg-red-100 text-red-700';
            return 'bg-yellow-100 text-yellow-700';
        }

        function filterData(status) {
            const filtered = status === 'Semua' ? pmbData : pmbData.filter(i => (i.status || 'Menunggu') === status);
            renderTable(filtered);
        }

        async function openDetail(index) {
            const item = pmbData[index];
            const { value: status } = await Swal.fire({
                title: 'Data Pendaftar',
                html: `<b>${item.nama}</b><br>NISN: ${item.nisn}<br>Asal: ${item.asal_sekolah}<br><br>
                       <select id="swal-status" class="w-full p-2 border rounded"><option value="Menunggu" ${item.status==='Menunggu'?'selected':''}>Menunggu</option><option value="Diterima" ${item.status==='Diterima'?'selected':''}>Diterima</option><option value="Ditolak" ${item.status==='Ditolak'?'selected':''}>Ditolak</option></select>`,
                confirmButtonText: 'Simpan Status',
                preConfirm: () => document.getElementById('swal-status').value
            });

            if (status) {
                // KIRIM KE GOOGLE SHEET
                const res = await fetch(URL_GAS, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'updateStatus', nisn: item.nisn, status: status })
                });
                const result = await res.json();
                
                if(result.status === 'success') {
                    pmbData[index].status = status;
                    renderTable(pmbData);
                    Swal.fire('Berhasil!', 'Status telah diperbarui di Database.', 'success');
                }
            }
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); document.getElementById('mobile-overlay').classList.toggle('hidden'); }
        function logout() { localStorage.removeItem('userRole'); window.location.href = 'https://mbs163.github.io/portal-app/login.html'; }
        
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('admin-name').innerText = localStorage.getItem('userName') || 'Admin';
            loadData();
        });
    </script>
</body>
</html>
