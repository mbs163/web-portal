<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Berita | Admin MAS MANBA'USSALAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#0B1F3B', accent: '#D4AF37', bgLight: '#F8FAFC' } } }
        }
        if (localStorage.getItem('userRole') !== 'admin') {
            window.location.href = 'https://mbs163.github.io/portal-app/login.html';
        }
    </script>
</head>
<body class="bg-bgLight text-slate-800 font-sans antialiased flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-primary text-white flex flex-col h-full shadow-2xl transform -translate-x-full md:translate-x-0 md:relative transition-transform duration-300">
        <div class="p-6 border-b border-white/10">
            <h2 class="font-bold tracking-wide">Admin Portal</h2>
            <p class="text-[10px] text-accent uppercase tracking-widest">MAS Manba'ussalam</p>
        </div>
        <div class="flex-1 py-6 px-4 space-y-1">
            <a href="index.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-slate-300 hover:text-white hover:bg-white/10"><i class="fa-solid fa-house w-5"></i> Dashboard</a>
            <div class="pt-4 pb-2 text-[10px] font-bold text-slate-500 uppercase px-3">Konten</div>
            <a href="berita.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-accent bg-white/10 font-bold"><i class="fa-solid fa-newspaper w-5"></i> Berita Web</a>
            <a href="admin-galeri.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-slate-300 hover:text-white hover:bg-white/10"><i class="fa-solid fa-images w-5"></i> Galeri Foto</a>
        </div>
        <div class="p-4 border-t border-white/10"><button onclick="logout()" class="w-full text-red-400 text-sm font-bold"><i class="fa-solid fa-power-off"></i> Keluar</button></div>
    </aside>

    <main class="flex-1 overflow-y-auto p-6 sm:p-10">
        <!-- TABS -->
        <div class="flex gap-4 mb-8">
            <button onclick="showTab('create')" id="tab-create" class="px-6 py-2 rounded-xl font-bold bg-primary text-white">Tulis Berita</button>
            <button onclick="showTab('list')" id="tab-list" class="px-6 py-2 rounded-xl font-bold bg-white text-slate-500 border border-slate-200">Daftar Berita</button>
        </div>

        <!-- FORM CREATE / EDIT -->
        <div id="section-create" class="max-w-3xl bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
            <h2 id="form-title" class="text-2xl font-bold mb-6">Tulis Berita Baru</h2>
            <form id="newsForm" class="space-y-4">
                <input type="hidden" id="edit-id">
                <input type="text" id="judul" required class="w-full p-3 border rounded-xl" placeholder="Judul Berita">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="tanggal" required class="w-full p-3 border rounded-xl" placeholder="Tanggal (Contoh: 15 Okt 2026)">
                   <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">Kategori</label>
<select id="kategori" class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary outline-none transition-all bg-white">
    <option value="Akademik">Akademik</option>
    <option value="Kesiswaan">Kesiswaan</option>
    <option value="Kepegawaian">Kepegawaian</option>
    <option value="Informasi Publik">Informasi Publik</option>
</select>
                </div>
                <input type="text" id="gambar" required class="w-full p-3 border rounded-xl" placeholder="URL Gambar (assets/images/foto.jpg)">
                <textarea id="konten" required class="w-full p-3 border rounded-xl h-32" placeholder="Isi berita..."></textarea>
                <button type="submit" class="w-full bg-primary text-white p-4 rounded-xl font-bold hover:bg-slate-900">Simpan Perubahan</button>
            </form>
        </div>

        <!-- TAB LIST -->
        <div id="section-list" class="hidden bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="text-2xl font-bold mb-6">Daftar Berita</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="text-xs text-slate-400 uppercase border-b"><tr><th class="p-3">Judul</th><th class="p-3">Kategori</th><th class="p-3">Aksi</th></tr></thead>
                    <tbody id="news-table-body"></tbody>
                </table>
            </div>
        </div>

        <!-- OUTPUT AREA -->
        <div id="resultArea" class="hidden mt-8 bg-slate-900 p-6 rounded-2xl text-white">
            <h3 class="font-bold mb-4 text-accent">Hasil JSON (Copy & Paste ke file berita.json)</h3>
            <textarea id="jsonOutput" class="w-full bg-slate-950 p-4 rounded-lg font-mono text-xs h-64 border border-slate-700"></textarea>
            <a href="https://github.com/mbs163/web-portal/edit/main/data/berita.json" target="_blank" class="block text-center mt-4 bg-emerald-600 p-3 rounded-xl font-bold">Buka GitHub untuk Paste</a>
        </div>
    </main>

    <script>
        let newsData = [];

        // Load data
        fetch('data/berita.json').then(r => r.json()).then(data => { newsData = data; renderTable(); });

        function showTab(tab) {
            document.getElementById('section-create').classList.toggle('hidden', tab !== 'create');
            document.getElementById('section-list').classList.toggle('hidden', tab !== 'list');
            document.getElementById('tab-create').className = tab === 'create' ? 'px-6 py-2 rounded-xl font-bold bg-primary text-white' : 'px-6 py-2 rounded-xl font-bold bg-white text-slate-500 border';
            document.getElementById('tab-list').className = tab === 'list' ? 'px-6 py-2 rounded-xl font-bold bg-primary text-white' : 'px-6 py-2 rounded-xl font-bold bg-white text-slate-500 border';
        }

        function renderTable() {
            const tbody = document.getElementById('news-table-body');
            tbody.innerHTML = newsData.map(n => `
                <tr class="border-b">
                    <td class="p-3 font-medium">${n.judul}</td>
                    <td class="p-3 text-slate-500">${n.kategori}</td>
                    <td class="p-3 flex gap-2">
                        <button onclick="editNews(${n.id})" class="text-blue-600 hover:underline">Edit</button>
                        <button onclick="deleteNews(${n.id})" class="text-red-600 hover:underline">Hapus</button>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('newsForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const newObj = {
                id: id ? parseInt(id) : new Date().getTime(),
                judul: document.getElementById('judul').value,
                tanggal: document.getElementById('tanggal').value,
                kategori: document.getElementById('kategori').value,
                konten: document.getElementById('konten').value,
                gambar: document.getElementById('gambar').value,
                slug: document.getElementById('judul').value.toLowerCase().replace(/ /g,'-')
            };

            if (id) {
                const index = newsData.findIndex(n => n.id == id);
                newsData[index] = newObj;
            } else {
                newsData.unshift(newObj);
            }
            updateOutput();
        });

        function editNews(id) {
            const news = newsData.find(n => n.id == id);
            document.getElementById('edit-id').value = news.id;
            document.getElementById('judul').value = news.judul;
            document.getElementById('tanggal').value = news.tanggal;
            document.getElementById('kategori').value = news.kategori;
            document.getElementById('konten').value = news.konten;
            document.getElementById('gambar').value = news.gambar;
            document.getElementById('form-title').innerText = "Edit Berita";
            showTab('create');
        }

        function deleteNews(id) {
            newsData = newsData.filter(n => n.id != id);
            updateOutput();
        }

        function updateOutput() {
            document.getElementById('jsonOutput').value = JSON.stringify(newsData, null, 2);
            document.getElementById('resultArea').classList.remove('hidden');
            renderTable();
            Swal.fire('Berhasil!', 'Data diperbarui, salin kode JSON di bawah.', 'success');
        }

        function logout() { localStorage.removeItem('userRole'); window.location.href = 'https://mbs163.github.io/portal-app/login.html'; }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
    </script>
</body>
</html>
